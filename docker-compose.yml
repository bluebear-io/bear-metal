services:
  # The monolith: manager + worker (in-process) + shared, one container.
  manager:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
    volumes:
      # Persist in-progress repo workspaces across container restarts
      - ./workspace:/app/workspace
      # Persist SQLite database across container restarts
      - ./data:/app/data
