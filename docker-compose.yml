services:
  # The monolith: manager + worker + UI/API server, one container.
  manager:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-3100}:${BACKEND_PORT:-3100}"
    restart: unless-stopped
    volumes:
      # Persist in-progress repo workspaces across container restarts
      - ./workspace:/app/workspace
      # Persist SQLite database across container restarts
      - ./data:/app/data
