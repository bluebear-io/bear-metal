# bear-metal CI/CD (DEN-2370)
#
# PR / push to main: typecheck + tests + docker build (verify only, no push)
# Release / workflow_dispatch: build + push to ghcr.io + push to ECR (dev)

name: Build and Deploy

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: build-and-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AWS_REGION: us-east-1
  DEV_ACCOUNT_ID: "571938892820"
  ECR_REPO: bear-metal

jobs:
  test:
    name: Typecheck and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build:
    name: Build Docker image
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.DEV_ACCOUNT_ID }}:role/GithubActionsLambdaDeployRole
          role-session-name: bear-metal-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: tags
        run: |
          GHCR_REPO="ghcr.io/${{ github.repository_owner }}/bear-metal"
          ECR_REPO="${{ steps.ecr_login.outputs.registry }}/${{ env.ECR_REPO }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ghcr_tags=${GHCR_REPO}:${{ github.ref_name }},${GHCR_REPO}:latest" >> "$GITHUB_OUTPUT"
            echo "ecr_tags=${ECR_REPO}:${{ github.ref_name }},${ECR_REPO}:latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ghcr_tags=${GHCR_REPO}:latest" >> "$GITHUB_OUTPUT"
            echo "ecr_tags=${ECR_REPO}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "ghcr_tags=${GHCR_REPO}:build-check" >> "$GITHUB_OUTPUT"
            echo "ecr_tags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ steps.tags.outputs.ghcr_tags }}
            ${{ steps.tags.outputs.ecr_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
