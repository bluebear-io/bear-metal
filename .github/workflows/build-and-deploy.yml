# bear-metal CI/CD
#
# PR / push to main: typecheck + tests + docker build (verify only, no push)
# Release / workflow_dispatch: build + push to ghcr.io (public image)

name: Build and Deploy

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: build-and-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Typecheck and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci
        working-directory: src/ui

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run UI tests
        run: npm test
        working-directory: src/ui

  build:
    name: Build Docker image
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          GHCR_REPO="ghcr.io/${{ github.repository_owner }}/bear-metal"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ghcr_tags=${GHCR_REPO}:${{ github.ref_name }},${GHCR_REPO}:latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ghcr_tags=${GHCR_REPO}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "ghcr_tags=${GHCR_REPO}:build-check" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.tags.outputs.ghcr_tags }}
          build-args: APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
