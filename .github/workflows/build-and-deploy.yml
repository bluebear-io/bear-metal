# bear-metal CI/CD (DEN-2370)
#
# PR / push to main: typecheck + tests + docker build (verify only, no push)
# Release:          typecheck + tests + build + push to ghcr.io

name: Build and Deploy

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: build-and-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Typecheck and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build:
    name: Build Docker image
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/bear-metal"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tags=${REPO}:${{ github.ref_name }},${REPO}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REPO}:build-check" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image (and push on release)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
