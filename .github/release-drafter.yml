# Release Drafter Configuration
# Defines how merged PRs are categorized in release notes
# See: https://github.com/release-drafter/release-drafter

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Categories based on PR labels or title prefixes
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '⚡ Performance'
    labels:
      - 'perf'
      - 'performance'
  - title: '♻️ Refactoring'
    labels:
      - 'refactor'
      - 'refactoring'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🔧 Infrastructure & CI'
    labels:
      - 'infra'
      - 'infrastructure'
      - 'devops'
      - 'ci'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
      - 'deps'
    collapse-after: 5
  - title: '🔨 Other Changes'
    labels:
      - '*'

# Autolabeling based on PR title (conventional commits)
autolabeler:
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?:/i'
      - '/^feature(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
      - '/^bugfix(\(.+\))?:/i'
  - label: 'perf'
    title:
      - '/^perf(\(.+\))?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: 'docs'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'infra'
    title:
      - '/^ci(\(.+\))?:/i'
      - '/^chore(\(.+\))?:/i'
      - '/^build(\(.+\))?:/i'

# Version resolver based on labels
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'perf'
      - 'refactor'
      - 'docs'
      - 'infra'
      - 'dependencies'
  default: patch

# Exclude certain PRs from release notes
exclude-labels:
  - 'skip-changelog'
  - 'release'

# Release notes template
template: |
  ## 🎉 Release v$RESOLVED_VERSION

  $CHANGES

  ---

  **Contributors:** $CONTRIBUTORS

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
